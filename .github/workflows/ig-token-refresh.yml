name: ig-token-refresh

# 毎月1日 12:00 JST (= 03:00 UTC) にトークンを自動延長。手動実行も可。
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pynacl
      - name: Refresh token and update secret
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python refresh_token.py
