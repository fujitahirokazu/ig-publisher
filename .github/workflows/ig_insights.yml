name: IG Insights Fetch
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 22 * * *'
permissions:
  contents: write
concurrency:
  group: ig-insights
  cancel-in-progress: false
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Write and run fetcher (inlined via base64)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: ${{ vars.GRAPH_VERSION }}
        run: |
          python3 -c "import base64,pathlib;pathlib.Path('fetch_ig_insights.py').write_bytes(base64.b64decode(''))"
          python3 fetch_ig_insights.py
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ig_insights.json
          git commit -m "chore: IG insights update [skip ci]" || echo "no changes to commit"
          git push
